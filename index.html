<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Pro Samsung</title>
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding: 50px 20px; }
        #status { margin: 20px; color: #00ff00; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        button { 
            padding: 25px; width: 100%; max-width: 300px; border-radius: 15px; border: none;
            background: #1ed760; color: #000; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(30,215,96,0.3);
        }
        button:active { transform: scale(0.98); background: #1db954; }
    </style>
</head>
<body>
    <h1>esRadio Sin Cortes</h1>
    <div id="status">PULSA PARA CONECTAR</div>
    <button id="playBtn">REPRODUCIR</button>

    <script>
        // URL compatible con reproductores Android/Samsung
        const STREAM_URL = "https://stream.esradio.fm/esradio/libertaddigital.mp3";
        
        let audio = new Audio();
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');

        function conectar() {
            status.textContent = "CONECTANDO...";
            
            // Forzamos limpieza del buffer anterior
            audio.pause();
            audio.src = "";
            audio.load();
            
            // Reasignamos y configuramos
            audio.src = STREAM_URL;
            audio.setAttribute("preload", "auto");
            
            audio.play().then(() => {
                status.textContent = "• EN DIRECTO";
                btn.textContent = "PAUSAR";
                btn.style.background = "#ff4444";
            }).catch(e => {
                status.textContent = "BUSCANDO SEÑAL...";
                console.log("Error de red, reintentando...");
                setTimeout(conectar, 2000);
            });
        }

        btn.onclick = () => {
            if (audio.paused || audio.src === "") {
                conectar();
            } else {
                audio.pause();
                audio.src = "";
                btn.textContent = "REPRODUCIR";
                btn.style.background = "#1ed760";
                status.textContent = "PAUSADO";
            }
        };

        // Si la red cambia (WiFi -> 4G), Samsung suele lanzar 'stalled'
        audio.addEventListener('stalled', () => {
            status.textContent = "RECONECTANDO RED...";
            conectar();
        });

        // Evento extra para asegurar que no se quede mudo
        audio.addEventListener('waiting', () => {
            status.textContent = "CARGANDO AUDIO...";
        });
    </script>
</body>
</html>
