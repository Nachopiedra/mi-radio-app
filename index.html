<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Anti-Cortes</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 50px; }
        #status { color: #00ff00; margin: 20px; font-weight: bold; min-height: 24px; }
        button { padding: 30px; font-size: 1.5rem; border-radius: 50px; border: none; cursor: pointer; background: #00ff00; color: black; width: 100%; max-width: 300px; }
    </style>
</head>
<body>
    <h1>esRadio Directo</h1>
    <div id="status">Listo para reproducir</div>
    <button id="playBtn">DAR AL PLAY</button>

    <script>
        const STREAM_URL = "https://stream.esradio.fm/esradio/libertaddigital.mp3";
        const audio = new Audio(STREAM_URL);
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');

        btn.onclick = () => {
            if (audio.paused) {
                status.textContent = "Conectando...";
                audio.play()
                    .then(() => {
                        status.textContent = "ESCUCHANDO AHORA";
                        btn.textContent = "PAUSAR";
                        btn.style.background = "#ff4444";
                    })
                    .catch(err => {
                        status.textContent = "Error. Reintentando...";
                        setTimeout(() => btn.click(), 2000);
                    });
            } else {
                audio.pause();
                btn.textContent = "REPRODUCIR";
                btn.style.background = "#00ff00";
                status.textContent = "Pausado";
            }
        };

        // Reconector automático si falla el internet
        audio.addEventListener('stalled', () => {
            status.textContent = "Recuperando señal...";
            audio.load();
            audio.play();
        });
    </script>
</body>
</html>
