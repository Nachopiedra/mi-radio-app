<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esRadio Sin Cortes</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: white; padding: 40px 20px; }
        #status { color: #00ff00; margin: 25px; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; }
        button { 
            padding: 25px; font-size: 1.4rem; border-radius: 50px; border: none; cursor: pointer; 
            background: #00ff00; color: black; width: 100%; max-width: 320px; 
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,255,0,0.3);
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .instrucciones { color: #888; font-size: 0.9rem; margin-top: 40px; line-height: 1.4; }
    </style>
</head>
<body>
    <h1>esRadio Directo</h1>
    <div id="status">Listo para conectar</div>
    
    <button id="playBtn">DAR AL PLAY</button>

    <div class="instrucciones">
        Si cambias de WiFi a 4G y se corta, <br>
        <b>espera 3 segundos</b> y volverá solo.
    </div>

    <script>
        // URL DIRECTA DE ESRADIO (HTTPS para evitar bloqueos)
        const STREAM_URL = "https://stream.esradio.fm/esradio/libertaddigital.mp3";
        
        const audio = new Audio();
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');

        let intentandoConectar = false;

        function iniciarRadio() {
            status.textContent = "Conectando con la antena...";
            audio.src = STREAM_URL;
            audio.load();
            
            audio.play()
                .then(() => {
                    status.textContent = "✓ EN DIRECTO";
                    btn.textContent = "PAUSAR RADIO";
                    btn.style.background = "#ff4444";
                    btn.style.boxShadow = "0 4px 15px rgba(255,0,0,0.3)";
                    intentandoConectar = false;
                })
                .catch(err => {
                    console.error("Error de inicio:", err);
                    status.textContent = "Buscando señal...";
                    // Reintento automático si falla
                    if(!intentandoConectar) {
                        intentandoConectar = true;
                        setTimeout(iniciarRadio, 3000);
                    }
                });
        }

        btn.onclick = () => {
            if (audio.paused || audio.src === "") {
                iniciarRadio();
            } else {
                audio.pause();
                audio.src = ""; // Cortamos el flujo para ahorrar datos
                btn.textContent = "REPRODUCIR";
                btn.style.background = "#00ff00";
                btn.style.boxShadow = "0 4px 15px rgba(0,255,0,0.3)";
                status.textContent = "Radio Pausada";
            }
        };

        // LA MAGIA: Detectar cuando el audio se detiene por cambio de red
        audio.addEventListener('waiting', () => {
            status.textContent = "Cambiando de red...";
        });

        audio.addEventListener('error', () => {
            status.textContent = "Señal perdida. Reconectando...";
            setTimeout(iniciarRadio, 2000);
        });

        // Si el móvil detecta que vuelve a tener internet
        window.addEventListener('online', () => {
            if (btn.textContent === "PAUSAR RADIO") {
                status.textContent = "Red recuperada. Sincronizando...";
                iniciarRadio();
            }
        });
    </script>
</body>
</html>
