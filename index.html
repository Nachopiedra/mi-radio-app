<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esRadio Pro</title>
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding: 50px 20px; margin: 0; }
        h1 { font-size: 1.6rem; margin-bottom: 5px; }
        #status { margin: 20px; color: #1ed760; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; text-transform: uppercase; }
        button {
            padding: 25px; width: 100%; max-width: 320px; border-radius: 50px; border: none;
            background: #1ed760; color: #000; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(30,215,96,0.4); transition: all 0.2s;
        }
        button:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .footer { margin-top: 50px; color: #555; font-size: 0.8rem; line-height: 1.4; }
    </style>
</head>
<body>

    <h1>esRadio Directo</h1>
    <div id="status">LISTO PARA REPRODUCIR</div>
    <button id="playBtn">▶ DAR AL PLAY</button>
    <div class="footer">Diseñada para Samsung.<br>Reconexión automática al cambiar a 4G.</div>

    <script>
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        const audio = new Audio();
        audio.preload = "none";

        let isPlaying = false;
        let streamUrls = [];
        let streamIndex = 0;

        // Servidores RadioBrowser (usa varios por si uno falla)
        const RB_SERVERS = [
            'https://de1.api.radio-browser.info',
            'https://nl1.api.radio-browser.info',
            'https://at1.api.radio-browser.info'
        ];

        async function obtenerUrlStream() {
            status.textContent = "BUSCANDO EMISORA...";
            for (const server of RB_SERVERS) {
                try {
                    const res = await fetch(
                        `${server}/json/stations/search?name=esradio&countrycode=ES&limit=10&hidebroken=true&order=clickcount&reverse=true`,
                        { headers: { 'User-Agent': 'esRadioApp/1.0' } }
                    );
                    const data = await res.json();
                    if (data && data.length > 0) {
                        // Filtramos solo las que tienen url_resolved y lastcheckok=1
                        const activas = data.filter(s => s.url_resolved && s.lastcheckok == 1);
                        if (activas.length > 0) {
                            streamUrls = activas.map(s => s.url_resolved);
                            console.log("Streams encontrados:", streamUrls);
                            return true;
                        }
                    }
                } catch (e) {
                    console.warn("Fallo servidor RadioBrowser:", server, e);
                }
            }
            return false;
        }

        async function conectar() {
            if (streamUrls.length === 0) {
                const ok = await obtenerUrlStream();
                if (!ok) {
                    status.textContent = "ERROR: SIN CONEXIÓN A INTERNET";
                    btn.disabled = false;
                    btn.textContent = "▶ REINTENTAR";
                    return;
                }
                streamIndex = 0;
            }

            status.textContent = "CONECTANDO...";
            audio.pause();
            audio.src = streamUrls[streamIndex];
            audio.load();

            try {
                await audio.play();
                status.textContent = "● EN DIRECTO";
                btn.textContent = "⏸ PAUSAR";
                btn.style.background = "#ff4444";
                btn.style.boxShadow = "0 10px 20px rgba(255,68,68,0.4)";
                btn.disabled = false;
                isPlaying = true;
            } catch (err) {
                console.error("Error reproduciendo stream " + streamIndex + ":", err);
                streamIndex++;
                if (streamIndex < streamUrls.length) {
                    status.textContent = "PROBANDO OTRA SEÑAL...";
                    setTimeout(conectar, 1500);
                } else {
                    // Agotamos todas las URLs, volver a buscar en RadioBrowser
                    streamUrls = [];
                    status.textContent = "RECONECTANDO...";
                    setTimeout(conectar, 3000);
                    btn.disabled = false;
                }
            }
        }

        function pausar() {
            audio.pause();
            audio.src = "";
            isPlaying = false;
            btn.textContent = "▶ DAR AL PLAY";
            btn.style.background = "#1ed760";
            btn.style.boxShadow = "0 10px 20px rgba(30,215,96,0.4)";
            status.textContent = "PAUSADO";
        }

        btn.onclick = () => {
            if (!isPlaying) {
                btn.disabled = true;
                streamUrls = []; // Forzar búsqueda fresca cada vez
                conectar();
            } else {
                pausar();
            }
        };

        audio.addEventListener('error', () => {
            if (isPlaying) {
                isPlaying = false;
                streamIndex++;
                if (streamIndex < streamUrls.length) {
                    conectar();
                } else {
                    streamUrls = [];
                    status.textContent = "RECONECTANDO...";
                    setTimeout(conectar, 3000);
                }
            }
        });

        audio.addEventListener('waiting', () => {
            if (isPlaying) status.textContent = "CARGANDO SEÑAL...";
        });

        audio.addEventListener('playing', () => {
            status.textContent = "● EN DIRECTO";
            isPlaying = true;
        });

        window.addEventListener('online', () => {
            if (isPlaying) {
                streamUrls = [];
                conectar();
            }
        });
    </script>
</body>
</html>
