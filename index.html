<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esRadio Pro</title>
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding: 50px 20px; margin: 0; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        #status { margin: 20px; color: #1ed760; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; text-transform: uppercase; }
        button { 
            padding: 25px; width: 100%; max-width: 320px; border-radius: 50px; border: none;
            background: #1ed760; color: #000; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 20px rgba(30,215,96,0.3); transition: all 0.2s;
        }
        button:active { transform: scale(0.96); opacity: 0.9; }
        .info { margin-top: 40px; color: #666; font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>esRadio Directo</h1>
    <div id="status">LISTO PARA CONECTAR</div>
    
    <button id="playBtn">DAR AL PLAY</button>

    <div class="info">
        Esta app detecta cortes de red.<br>
        Si cambias a 4G, se reconectará sola.
    </div>

    <script>
        // URL CORREGIDA CON WSS (Más compatible con Samsung/Chrome)
        const STREAM_URL = "https://wss.esradio.fm/esradio/libertaddigital.mp3";
        
        let audio = new Audio();
        const btn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        let isPlaying = false;

        function conectar() {
            status.textContent = "CONECTANDO...";
            
            audio.pause();
            audio.src = "";
            audio.load();
            
            // Re-configuración con la URL WSS
            audio.src = STREAM_URL;
            audio.preload = "auto";
            
            audio.play().then(() => {
                status.textContent = "• EN DIRECTO";
                btn.textContent = "PAUSAR";
                btn.style.background = "#ff4444";
                btn.style.boxShadow = "0 10px 20px rgba(255,68,68,0.3)";
                isPlaying = true;
            }).catch(e => {
                console.error("Error:", e);
                status.textContent = "REINTENTANDO SEÑAL...";
                // Reintento automático en 3 segundos si falla
                setTimeout(conectar, 3000);
            });
        }

        btn.onclick = () => {
            if (!isPlaying) {
                conectar();
            } else {
                audio.pause();
                audio.src = "";
                isPlaying = false;
                btn.textContent = "REPRODUCIR";
                btn.style.background = "#1ed760";
                btn.style.boxShadow = "0 10px 20px rgba(30,215,96,0.3)";
                status.textContent = "PAUSADO";
            }
        };

        // GESTIÓN AUTOMÁTICA DE CORTES
        audio.addEventListener('error', () => {
            if(isPlaying) {
                status.textContent = "RECONECTANDO...";
                setTimeout(conectar, 1000);
            }
        });

        window.addEventListener('online', () => {
            if(isPlaying) {
                status.textContent = "RECUPERANDO RED...";
                conectar();
            }
        });
    </script>
</body>
</html>
